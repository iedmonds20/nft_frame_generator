<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Loading Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test { padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .pass { background: #d4edda; border-color: #c3e6cb; }
        .fail { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🔍 NFT Framing App Debug Test</h1>
    
    <div class="test info">
        <h3>Test NFT Details</h3>
        <p><strong>Contract:</strong> 0x60E4d786628Fea6478F785A6d7e704777c86a7c6</p>
        <p><strong>Token ID:</strong> 8538</p>
        <p><strong>Network:</strong> Ethereum</p>
    </div>
    
    <div>
        <button onclick="testScriptLoading()">1. Test Script Loading</button>
        <button onclick="testEthers()">2. Test Ethers.js</button>
        <button onclick="testQRCode()">3. Test QRCode.js</button>
        <button onclick="testFetchAPI()">4. Test OpenSea API</button>
        <button onclick="testLoadNFTFunction()">5. Test loadNFT Function</button>
        <button onclick="runFullTest()">🚀 Run Full Test</button>
    </div>
    
    <div id="output"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <script>
        const output = document.getElementById('output');
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'test ' + type;
            div.innerHTML = message;
            output.appendChild(div);
            console.log(message);
        }
        
        function testScriptLoading() {
            output.innerHTML = '';
            log('<h3>✓ Test 1: Script Loading</h3><p>This test is running, so JavaScript works!</p>', 'pass');
            log(`<p>Document ready state: ${document.readyState}</p>`, 'info');
        }
        
        function testEthers() {
            output.innerHTML = '';
            try {
                if (typeof ethers === 'undefined') {
                    log('<h3>✗ Test 2: Ethers.js</h3><p>Ethers.js is NOT loaded!</p>', 'fail');
                } else {
                    log(`<h3>✓ Test 2: Ethers.js</h3><p>Version: ${ethers.version}</p>`, 'pass');
                    
                    // Test provider
                    const provider = new ethers.providers.JsonRpcProvider('https://eth.llamarpc.com');
                    log('<p>✓ Provider created successfully</p>', 'pass');
                }
            } catch (error) {
                log(`<h3>✗ Test 2: Ethers.js</h3><p>Error: ${error.message}</p>`, 'fail');
            }
        }
        
        function testQRCode() {
            output.innerHTML = '';
            try {
                if (typeof QRCode === 'undefined') {
                    log('<h3>✗ Test 3: QRCode.js</h3><p>QRCode.js is NOT loaded!</p>', 'fail');
                } else {
                    log('<h3>✓ Test 3: QRCode.js</h3><p>QRCode.js loaded successfully</p>', 'pass');
                }
            } catch (error) {
                log(`<h3>✗ Test 3: QRCode.js</h3><p>Error: ${error.message}</p>`, 'fail');
            }
        }
        
        async function testFetchAPI() {
            output.innerHTML = '';
            log('<h3>Test 4: OpenSea API</h3><p>Fetching NFT metadata...</p>', 'info');
            
            const contract = '0x60E4d786628Fea6478F785A6d7e704777c86a7c6';
            const tokenId = '8538';
            
            try {
                // Test OpenSea API
                const openseaUrl = `https://api.opensea.io/api/v2/chain/ethereum/contract/${contract}/nfts/${tokenId}`;
                log(`<p>Trying OpenSea: ${openseaUrl}</p>`, 'info');
                
                const response = await fetch(openseaUrl);
                log(`<p>Response status: ${response.status}</p>`, 'info');
                
                if (response.ok) {
                    const data = await response.json();
                    log(`<h3>✓ OpenSea API Success!</h3><pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>`, 'pass');
                    
                    if (data.nft && data.nft.image_url) {
                        log(`<p>✓ Image URL found: ${data.nft.image_url}</p>`, 'pass');
                    }
                } else {
                    const errorText = await response.text();
                    log(`<h3>⚠ OpenSea API returned ${response.status}</h3><p>${errorText}</p>`, 'fail');
                    
                    // Try direct contract call as fallback
                    log('<p>Trying direct contract call...</p>', 'info');
                    await testDirectContract(contract, tokenId);
                }
            } catch (error) {
                log(`<h3>✗ API Test Failed</h3><p>Error: ${error.message}</p><pre>${error.stack}</pre>`, 'fail');
            }
        }
        
        async function testDirectContract(contract, tokenId) {
            try {
                const provider = new ethers.providers.JsonRpcProvider('https://eth.llamarpc.com');
                const abi = ['function tokenURI(uint256 tokenId) view returns (string)'];
                const nftContract = new ethers.Contract(contract, abi, provider);
                
                log('<p>Calling tokenURI on contract...</p>', 'info');
                const tokenURI = await nftContract.tokenURI(tokenId);
                log(`<p>✓ Token URI: ${tokenURI}</p>`, 'pass');
                
                // Fetch metadata
                const metadataUrl = tokenURI.replace('ipfs://', 'https://ipfs.io/ipfs/');
                log(`<p>Fetching metadata from: ${metadataUrl}</p>`, 'info');
                
                const metaResponse = await fetch(metadataUrl);
                const metadata = await metaResponse.json();
                
                log(`<h3>✓ Direct Contract Success!</h3><pre>${JSON.stringify(metadata, null, 2).substring(0, 500)}...</pre>`, 'pass');
            } catch (error) {
                log(`<h3>✗ Direct Contract Failed</h3><p>Error: ${error.message}</p>`, 'fail');
            }
        }
        
        function testLoadNFTFunction() {
            output.innerHTML = '';
            
            // Check if app.js loaded
            if (typeof loadNFT === 'undefined') {
                log('<h3>✗ Test 5: loadNFT Function</h3><p>loadNFT function NOT found! app.js may not be loaded.</p>', 'fail');
                log('<p><strong>This is likely the main issue!</strong></p>', 'fail');
                
                // Try to load and check
                log('<p>Attempting to load app.js directly...</p>', 'info');
                const script = document.createElement('script');
                script.src = 'app.js?v=' + Date.now();
                script.onload = () => {
                    if (typeof loadNFT === 'undefined') {
                        log('<p>✗ Still not loaded after manual script injection</p>', 'fail');
                    } else {
                        log('<p>✓ loadNFT found after manual load!</p>', 'pass');
                    }
                };
                script.onerror = () => {
                    log('<p>✗ Failed to load app.js - file may not exist or has errors</p>', 'fail');
                };
                document.body.appendChild(script);
            } else {
                log('<h3>✓ Test 5: loadNFT Function</h3><p>loadNFT function exists!</p>', 'pass');
                log(`<p>Function signature: ${loadNFT.toString().substring(0, 200)}...</p>`, 'info');
            }
        }
        
        async function runFullTest() {
            output.innerHTML = '';
            log('<h2>🚀 Running Full Test Suite</h2>', 'info');
            
            testScriptLoading();
            await new Promise(r => setTimeout(r, 500));
            
            testEthers();
            await new Promise(r => setTimeout(r, 500));
            
            testQRCode();
            await new Promise(r => setTimeout(r, 500));
            
            testLoadNFTFunction();
            await new Promise(r => setTimeout(r, 500));
            
            await testFetchAPI();
            
            log('<h2>✅ Test Suite Complete</h2>', 'info');
        }
        
        // Auto-run on load
        console.log('Debug test page loaded');
    </script>
</body>
</html>
