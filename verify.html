<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Ownership Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .status {
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 4px solid;
        }
        
        .status.success {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        
        .status.error {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        
        .status.warning {
            background: #fef3c7;
            border-color: #f59e0b;
            color: #92400e;
        }
        
        .status h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        
        .info-grid {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .info-item {
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        
        .info-item label {
            font-weight: 600;
            color: #374151;
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }
        
        .info-item value {
            color: #6b7280;
            word-break: break-all;
            font-size: 0.9rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .verification-details {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0f9ff;
            border-radius: 8px;
            font-size: 0.875rem;
            color: #075985;
        }
        
        .loader {
            text-align: center;
            padding: 2rem;
        }
        
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 NFT Ownership Verification</h1>
        <p class="subtitle">Cryptographic proof of NFT ownership</p>
        
        <div id="verificationResult" class="loader">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: #666;">Verifying signature...</p>
        </div>
    </div>
    
    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <script>
        async function verifyOwnership() {
            const resultDiv = document.getElementById('verificationResult');
            
            try {
                // Get URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const contract = urlParams.get('contract');
                const tokenId = urlParams.get('tokenId');
                const proofJson = urlParams.get('proof');
                
                if (!proofJson) {
                    // No proof - just show NFT info
                    resultDiv.innerHTML = `
                        <div class="status warning">
                            <h2>⚠️ No Ownership Proof</h2>
                            <p>This QR code does not contain a cryptographic ownership proof.</p>
                        </div>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>Contract Address</label>
                                <value>${contract || 'Not provided'}</value>
                            </div>
                            <div class="info-item">
                                <label>Token ID</label>
                                <value>${tokenId || 'Not provided'}</value>
                            </div>
                        </div>
                        <a href="https://etherscan.io/token/${contract}?a=${tokenId}" target="_blank" class="btn">View on Etherscan</a>
                    `;
                    return;
                }
                
                // Parse proof data
                const proof = JSON.parse(decodeURIComponent(proofJson));
                
                // Verify signature
                const recoveredAddress = ethers.utils.verifyMessage(proof.message, proof.signature);
                const isValid = recoveredAddress.toLowerCase() === proof.address.toLowerCase();
                
                if (isValid) {
                    resultDiv.innerHTML = `
                        <div class="status success">
                            <h2>✅ Ownership Verified!</h2>
                            <p>The signature is cryptographically valid. This person controlled the wallet address at the time of signing.</p>
                        </div>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>Owner Address</label>
                                <value>${proof.address}</value>
                            </div>
                            <div class="info-item">
                                <label>NFT Contract</label>
                                <value>${proof.nftContract}</value>
                            </div>
                            <div class="info-item">
                                <label>Token ID</label>
                                <value>${proof.nftTokenId}</value>
                            </div>
                            <div class="info-item">
                                <label>NFT Name</label>
                                <value>${proof.nftName}</value>
                            </div>
                            <div class="info-item">
                                <label>Signed On</label>
                                <value>${new Date(proof.timestamp).toLocaleString()}</value>
                            </div>
                        </div>
                        <div class="verification-details">
                            <strong>How verification works:</strong><br>
                            The signature was created by the private key of the wallet address shown above. 
                            This proves that the person who created this frame had control of that wallet at the time of signing.
                            No one can forge this signature without access to the private key.
                        </div>
                        <a href="https://etherscan.io/token/${proof.nftContract}?a=${proof.nftTokenId}" target="_blank" class="btn">View NFT on Etherscan</a>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="status error">
                            <h2>❌ Invalid Signature</h2>
                            <p>The signature verification failed. This proof may have been tampered with.</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Verification error:', error);
                resultDiv.innerHTML = `
                    <div class="status error">
                        <h2>❌ Verification Error</h2>
                        <p>Unable to verify ownership: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Start verification when page loads
        verifyOwnership();
    </script>
</body>
</html>
